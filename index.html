<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRE SPRITE COMPANION</title>

    <link rel="stylesheet" href="./Senna/code/css/style.css">
</head>
<body>
    <!------------------ BODY start -------------------->


        <!------------------ SPRITE start -------------->
            <!-----Sprite Arm Left start ----->
            <img 
                class="fire-sprite" 
                src="./Senna/assets/fire-sprite/fire-sprite.svg" 
                alt="Fire Sprite"
            >
            <!----- Sprite Arm Left end ----->

            <!-----Sprite Body start ----->
            <img 
                class="fire-sprite" 
                src="./Senna/assets/fire-sprite/fire-sprite.svg" 
                alt="Fire Sprite"
            >
            <!----- Sprite Body end ----->

            <!----- Sprite Arm Left start ----->
            <img 
                class="fire-sprite" 
                src="./Senna/assets/fire-sprite/fire-sprite.svg" 
                alt="Fire Sprite"
            >
            <!----- Sprite Arm Left end ----->
        <!------------------ SPRITE end ---------------->


        <!-------------- AUDIO fire-sprite start -------------->
        <audio
            class="fire-audio" 
            autoplay
            controls 
            loop
        >
                <source
                src="./Senna/assets/audio/fireplace-loop-crackling.mp3"
                type="audio/mpeg">

        </audio>
        <!-------------- AUDIO fire-sprite end -------------->
