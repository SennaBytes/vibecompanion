<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRE SPRITE COMPANION</title>

    <!-- LINK EXTERNAL DOCUMENTS -->
    <link rel="stylesheet" href="./code/css/style.css">
    <script src="./code/js/script.js" defer></script>

    <!-- PRECONNECT GOOGLE FONTS -->
     <link href="https://fonts.googleapis.com/css2?family=Macondo+Swash+Caps&display=swap" rel="stylesheet">
</head>
<body>
    <!------------------ BODY start ---------------------------->


        <!------------------ SPRITE start ---------------------->
            <!-----Sprite Arm Left start -------->
            <img 
                class="fire-sprite-arm-left firedSprite" 
                src="./assets/img/svg/fire-sprite/fire-sprite-arm-left.svg" 
                alt="Fire Sprite"
            >
            <!----- Sprite Arm Left end --------->

            <!-----Sprite Body start ------------>
            <img 
                class="fire-sprite firedSprite" 
                src="./assets/img/svg/fire-sprite/fire-sprite.svg" 
                alt="Fire Sprite"
            >
            <!----- Sprite Body end ------------->

            <!----- Sprite Arm Right start ------->
            <img 
                class="fire-sprite-arm-right firedSprite" 
                src="./assets/img/svg/fire-sprite/fire-sprite-arm-right.svg" 
                alt="Fire Sprite"
            >
            <!----- Sprite Arm Right end --------->
        <!------------------ SPRITE end ----------------------->

        <!------------------ TEXT-CLOUD start ----------------->
            <img 
                class="text-cloud firedSprite" 
                src="./assets/img/svg/text-cloud/text-cloud.svg" 
                alt="Text Cloud"
            >
            <div class="fire-message">That's fiery</div>
        <!------------------ TEXT-CLOUD end ------------------->

        <!-------------- AUDIO fire-sprite start -------------->
        <audio
            class="fire-audio" 
            autoplay
            controls 
            loop
        >
                <source
                src="./assets/audio/fireplace-loop-crackling.mp3"
                type="audio/mpeg">
                ⓘ Your browser does not support audio.
        </audio>
        <!-------------- AUDIO fire-sprite end --------------->


    <!------------------ BODY end ---------------------------->
</body>
</html>
